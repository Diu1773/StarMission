services:
  # ── 백엔드 (FastAPI) ──────────────────────────────────────────────────────
  - type: web
    name: starmission-backend
    runtime: python
    region: singapore
    plan: free
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: GOOGLE_CLIENT_ID
        value: ""
      - key: JWT_SECRET_KEY
        generateValue: true
      - key: FRONTEND_ORIGIN
        value: https://starmission-frontend.onrender.com
      - key: DATABASE_URL
        value: sqlite:///./app.db
      - key: COOKIE_SECURE
        value: "true"
      - key: COOKIE_SAMESITE
        value: none
      - key: GROQ_API_KEY
        value: ""

  # ── 프론트엔드 (React / Vite → Static Site) ──────────────────────────────
  - type: web
    name: starmission-frontend
    runtime: static
    rootDir: frontend
    buildCommand: npm install && npm run build
    staticPublishPath: dist
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
    envVars:
      - key: VITE_API_BASE_URL
        value: https://starmission-backend.onrender.com
      - key: VITE_GOOGLE_CLIENT_ID
        value: ""
