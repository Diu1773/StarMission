services:
  # ── 백엔드 (FastAPI) ──────────────────────────────────────────────────────
  - type: web
    name: starmission-backend
    runtime: python
    region: singapore          # 서울과 가장 가까운 리전
    plan: free
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: GOOGLE_CLIENT_ID
        sync: false            # Render 대시보드에서 직접 입력
      - key: JWT_SECRET_KEY
        generateValue: true    # Render가 자동으로 랜덤 시크릿 생성
      - key: FRONTEND_ORIGIN
        sync: false            # 프론트엔드 배포 후 입력 (e.g. https://starmission.onrender.com)
      - key: DATABASE_URL
        value: sqlite:///./app.db
      - key: COOKIE_SECURE
        value: "true"
      - key: COOKIE_SAMESITE
        value: none
      - key: GROQ_API_KEY
        sync: false            # Render 대시보드에서 직접 입력

  # ── 프론트엔드 (React / Vite → Static Site) ──────────────────────────────
  - type: web
    name: starmission-frontend
    runtime: static
    plan: free
    rootDir: frontend
    buildCommand: npm install && npm run build
    staticPublishPath: dist
    routes:
      - type: rewrite
        source: /*
        destination: /index.html   # SPA 라우팅
    envVars:
      - key: VITE_API_BASE_URL
        sync: false                # 백엔드 배포 후 URL 입력 (e.g. https://starmission-backend.onrender.com)
      - key: VITE_GOOGLE_CLIENT_ID
        sync: false
